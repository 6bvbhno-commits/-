services:
  - type: worker
    name: asset-manager-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: bash bot/run.sh
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AFFILIATE_TAG
        value: rashedalhano-21
      - key: AMAZON_DOMAIN
        value: amazon.sa
      - key: MOCK_MODE
        value: "false"
